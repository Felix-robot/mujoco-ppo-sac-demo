algo: PPO
env_id: Humanoid-v5
policy: MlpPolicy
seed: 42
total_timesteps: 1000000
n_envs: 4
vec_env: dummy
device: auto
run_root: runs
verbose: 1

env_kwargs: {}

reward_shaping:
  reward_scale: 1.0
  extra_info_weights: {}

normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0
  gamma: 0.99

eval:
  freq: 25000
  episodes: 5

save:
  freq: 100000

hyperparams:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 512
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
