algo: PPO
env_id: HalfCheetah-v5
policy: MlpPolicy
seed: 43
total_timesteps: 200000
n_envs: 4
vec_env: dummy
device: auto
run_root: runs
verbose: 1

env_kwargs: {}

reward_shaping:
  reward_scale: 1.0
  extra_info_weights:
    reward_forward: 0.10
    reward_ctrl: 0.05

normalize:
  enabled: true
  norm_obs: true
  norm_reward: true
  clip_obs: 10.0
  gamma: 0.99

eval:
  freq: 10000
  episodes: 5

save:
  freq: 50000

hyperparams:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 256
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
