algo: SAC
env_id: HalfCheetah-v5
policy: MlpPolicy
seed: 42
total_timesteps: 300000
n_envs: 1
vec_env: dummy
device: auto
run_root: runs
verbose: 1

env_kwargs: {}

reward_shaping:
  reward_scale: 1.0
  extra_info_weights: {}

normalize:
  enabled: false

eval:
  freq: 10000
  episodes: 5

save:
  freq: 50000

hyperparams:
  learning_rate: 0.0003
  buffer_size: 1000000
  learning_starts: 10000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto
  policy_kwargs:
    net_arch:
      - 256
      - 256
